    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #2c3e50 0%, #000000 100%);
            --panel-bg: #1e272e;
            --accent-blue: #1a506b;
            --text-main: #ffffff;
            --border-color: #34495e;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-gradient); color: var(--text-main); overflow: hidden; }

        .hidden { display: none !important; }
        .btn { 
            background: var(--accent-blue); color: white; border: none; 
            padding: 10px 15px; border-radius: 4px; cursor: pointer;
            text-align: center; font-weight: 600;
        }
        .btn:hover { filter: brightness(1.1); }

        /* Main Menu */
        #main-menu {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 40px;
        }
        #main-menu h1 { font-size: 3rem; margin: 0; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; width: 250px; }

        /* Layout */
        .page-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 30px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border-color);
        }
        .view-body { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { 
            width: 320px; min-width: 320px; background: var(--panel-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 15px; gap: 10px;
        }
        .scroll-list { flex: 1; overflow-y: auto; border: 1px solid #333; border-radius: 4px; background: rgba(0,0,0,0.2); }
        .list-item { 
            padding: 10px; border-bottom: 1px solid #333; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; font-size: 14px;
        }
        .list-item:hover { background: rgba(255,255,255,0.05); }

        .content-area { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #000; overflow: hidden; }
        .iframe-container { flex: 1; width: 100%; position: relative; background: #fff; border-radius: 4px; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 4px; }

        /* Pro-X Specific */
        #prox-frame { border-radius: 0; background: #000; }

        /* Editor Specific */
        #tab-bar { 
            display: flex; background: #000; overflow-x: auto; white-space: nowrap; 
            scrollbar-width: none; border-bottom: 1px solid var(--border-color);
        }
        #tab-bar::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 20px; background: #222; cursor: pointer; border-right: 1px solid #333; font-size: 13px; }
        .tab.active { background: var(--accent-blue); }

        .editor-split { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
        textarea { 
            background: #1e1e1e; color: #fff; border: none; padding: 15px; 
            font-family: 'Consolas', monospace; resize: none; outline: none;
            overflow: auto; white-space: pre; width: 100%; height: 100%;
        }
    </style>
</head>

<script>
function updateVolumeLive(val) {
    const frame = document.getElementById('p-frame');
    if (frame && frame.contentWindow) {
        // This sends the volume to the iframe WITHOUT reloading it
        frame.contentWindow.postMessage({ type: 'setVolume', value: val }, '*');
    }
}
// --- ERROR TRACKING SYSTEM ---
var systemLogs = [];

function addToLog(msg, type = "ERROR") {
    const list = document.getElementById('error-log-list');
    const time = new Date().toLocaleTimeString();
    const color = type === "WARN" ? "#ffcc00" : "#ff4d4d";
    
    const logEntry = `<div style="color:${color}; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
        [${time}] <b>${type}:</b> ${msg}
    </div>`;
    
    systemLogs.push(logEntry);
    
    if (list) {
        list.innerHTML = systemLogs.join('');
        // Auto-scroll to bottom of logs
        const container = document.getElementById('error-console');
        container.scrollTop = container.scrollHeight;
    }
}

function clearLogs() {
    systemLogs = [];
    const list = document.getElementById('error-log-list');
    if (list) list.innerHTML = '';
}

// 1. Capture standard errors (syntax, undefined, etc)
window.onerror = function(msg, url, line, col, error) {
    addToLog(`${msg} <br><small>at line ${line} in ${url}</small>`);
    return false; // Let it still show in the real console too
};

// 2. Capture Promise rejections (failed fetches/imports)
window.onunhandledrejection = function(event) {
    addToLog("Async Error: " + event.reason, "ERROR");
};

// 3. THE "DEVTOOLS" FIX: Capture manual console.error calls
const nativeConsoleError = console.error;
console.error = function(...args) {
    addToLog(args.join(' '), "ERROR");
    nativeConsoleError.apply(console, args);
};

// 4. THE "DEVTOOLS" FIX: Capture manual console.warn calls
const nativeConsoleWarn = console.warn;
console.warn = function(...args) {
    addToLog(args.join(' '), "WARN");
    nativeConsoleWarn.apply(console, args);
};

// 5. F9 Toggle Logic
window.addEventListener('keydown', function(e) {
    if (e.key === "F9") {
        e.preventDefault();
        const menu = document.getElementById('error-console');
        if (menu) {
            menu.classList.toggle('hidden');
        }
    }
});

function copyFullLog() {
    const list = document.getElementById('error-log-list');
    if (!list || systemLogs.length === 0) {
        alert("Log is empty!");
        return;
    }

    // Convert the HTML entries into plain text for a clean copy
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = systemLogs.join('\n');
    const plainText = tempDiv.innerText || tempDiv.textContent;

    navigator.clipboard.writeText(plainText).then(() => {
        // Find the button specifically by looking for the one that says "Copy All"
        const btns = document.querySelectorAll('#error-console .btn');
        let copyBtn = Array.from(btns).find(b => b.innerText.includes("Copy"));
        
        if (copyBtn) {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "✓ Copied!";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        }
    }).catch(err => {
        // This will now show up in your F9 log if it fails!
        console.error("Manual Copy Failed: ", err);
    });
}

    function showPage(id) {
        // Kill sounds when moving
        killFrame('p-frame', 'p-container');
        killFrame('ed-frame', 'ed-container');
        
        // Specifically reset Pro-X when leaving
        if (id !== 'page-prox') {
            const px = document.getElementById('prox-frame');
            if(px) px.src = "https://www.example.com/"; 
        }

        document.querySelectorAll('.page-container, #main-menu').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        if(id === 'page-playables') renderPlayList();
        if(id === 'page-editor') renderEditor();
    }

    function killFrame(frameId, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `<iframe id="${frameId}"></iframe>`;
    }

    function renderPlayList() {
        const q = document.getElementById('p-search').value.toLowerCase();
        const list = document.getElementById('p-list');
        list.innerHTML = '';
        [...PRESETS, ...games].forEach((g, i) => {
            if(!g.name.toLowerCase().includes(q)) return;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span style="flex:1" onclick="loadGame(${i})">${g.name}</span>`;
            list.appendChild(div);
        });
    }

    async function loadGame(i) {
        killFrame('p-frame', 'p-container');
        const all = [...PRESETS, ...games];
        const target = all[i];
        let content = "";
        if(target.url) {
            const r = await fetch(target.url);
            content = await r.text();
        } else {
            content = target.content;
        }
        currentPlayContent = content;
        write('p-frame', content);
    }

    const handleFileImport = (e) => {
        Array.from(e.target.files).forEach(f => {
            if(f.name.endsWith('.html')) {
                const r = new FileReader();
                r.onload = (ev) => { games.push({name: f.name, content: ev.target.result}); renderPlayList(); };
                r.readAsText(f);
            }
        });
    };
    document.getElementById('p-import').onchange = handleFileImport;
    document.getElementById('p-folder-import').onchange = handleFileImport;

    function refreshPlay() { 
        killFrame('p-frame', 'p-container');
        write('p-frame', currentPlayContent); 
    }

    function renderEditor() {
        const tree = document.getElementById('ed-tree');
        const tabs = document.getElementById('tab-bar');
        tree.innerHTML = ''; tabs.innerHTML = '';
        edFiles.forEach((f, i) => {
            const treeItem = document.createElement('div');
            treeItem.className = 'list-item';
            treeItem.innerHTML = `<span style="flex:1" onclick="setEd(${i})">${f.name}</span><span style="color:red; padding-left:10px;" onclick="delFile(${i})">×</span>`;
            tree.appendChild(treeItem);

            const tab = document.createElement('div');
            tab.className = `tab ${i === activeEdIdx ? 'active' : ''}`;
            tab.innerText = f.name;
            tab.onclick = () => setEd(i);
            tabs.appendChild(tab);
        });
        document.getElementById('ed-code').value = edFiles[activeEdIdx].content;
        updatePreview();
    }

    function setEd(i) { activeEdIdx = i; renderEditor(); }

    function delFile(i) {
        if(edFiles.length <= 1) return;
        edFiles.splice(i, 1);
        activeEdIdx = 0;
        save(); renderEditor();
    }

    function addFile(name = null, content = '') {
        const n = name || prompt("Filename:", "new.html");
        if(n) { edFiles.push({name: n, content: content}); activeEdIdx = edFiles.length - 1; save(); renderEditor(); }
    }

    document.getElementById('ed-import').onchange = (e) => {
        Array.from(e.target.files).forEach(f => {
            const r = new FileReader();
            r.onload = (ev) => addFile(f.name, ev.target.result);
            r.readAsText(f);
        });
    };

    document.getElementById('ed-code').oninput = (e) => {
        edFiles[activeEdIdx].content = e.target.value;
        save(); updatePreview();
    };

    function updatePreview() {
        write('ed-frame', edFiles[activeEdIdx].content);
        document.getElementById('b64-str').innerText = btoa(unescape(encodeURIComponent(edFiles[activeEdIdx].content)));
    }

    function exportFile() {
        const blob = new Blob([edFiles[activeEdIdx].content], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = edFiles[activeEdIdx].name;
        a.click();
    }

    function save() { localStorage.setItem('gamma_ed_v3', JSON.stringify(edFiles)); }
    
function write(id, code) {
    const f = document.getElementById(id);
    if (!f) return;

    const volumeLockScript = `
    <script>
        (function() {
            window._currentVol = 0.5; // Shared volume state

            // LISTEN FOR SLIDER MOVES
            window.addEventListener('message', (e) => {
                if (e.data.type === 'setVolume') {
                    window._currentVol = parseFloat(e.data.value);
                    // Force update existing tags immediately
                    document.querySelectorAll('audio, video').forEach(m => m.volume = window._currentVol);
                }
            });

            // 1. THE TRAP FOR <AUDIO> AND <VIDEO>
            // This prevents the game from ever changing the volume property
            Object.defineProperty(HTMLMediaElement.prototype, 'volume', {
                get: function() { return this._volume || window._currentVol; },
                set: function(v) { 
                    // We ignore 'v' (what the game wants) and use our slider value
                    this._volume = window._currentVol; 
                },
                configurable: true
            });

            // 2. THE TRAP FOR WEB AUDIO (AudioContext)
            const RawAudioContext = window.AudioContext || window.webkitAudioContext;
            if (RawAudioContext) {
                window.AudioContext = window.webkitAudioContext = function() {
                    const ctx = new RawAudioContext();
                    const masterGain = ctx.createGain();
                    
                    // Constantly force the master gain to match our slider
                    setInterval(() => {
                        if (masterGain.gain.value !== window._currentVol) {
                            masterGain.gain.value = window._currentVol;
                        }
                    }, 50);

                    // Redirect all game audio through our locked gain node
                    masterGain.connect(ctx.destination);
                    Object.defineProperty(ctx, 'destination', {
                        value: masterGain,
                        writable: false
                    });
                    return ctx;
                };
            }
        })();
    <\/script>`;

    const d = f.contentWindow.document;
    d.open();
    d.write(volumeLockScript + code);
    d.close();
}
    
    function fs(id) { document.getElementById(id).requestFullscreen(); }
    function copyB64() { navigator.clipboard.writeText("data:text/html;base64," + document.getElementById('b64-str').innerText); alert("Copied!"); }

  function popOut(mode) {
    const win = window.open('about:blank');
    const rawCode = (mode === 'ed') ? edFiles[activeEdIdx].content : currentPlayContent;
    
    // Safety check: encode to base64 to prevent injection breakage
    const b64Code = btoa(unescape(encodeURIComponent(rawCode)));

                    // 1. COMPLETELY CLEAR THE OLD IFRAME (Kills old audio/code)
                    container.innerHTML = ''; 
                    
                    // 2. CREATE A FRESH IFRAME ELEMENT
                    const newFrame = document.createElement('iframe');
                    container.appendChild(newFrame);
                    
                    try {
                        const decoded = decodeURIComponent(escape(atob(base64)));
                        const d = newFrame.contentWindow.document;

                    } catch(e) {

                // Initial Load
                updateFrame("${b64Code}");

                function requestRefresh() {
                    window.opener.postMessage({type: 'req', mode: '${mode}'}, '*');
                }

                window.addEventListener('message', (e) => {
                    if (e.data.type === 'upd') {
                        const newB64 = btoa(unescape(encodeURIComponent(e.data.code)));

}
// ====================== STABLE CLOAK - SLOW CYCLING ======================
let cloak = null;
let panic = false;

const WIKI_URL = "https://en.wikipedia.org/wiki/Main_Page";

const safeIdentities = [
    { title: "Khan Academy", favicon: "https://www.khanacademy.org/favicon.ico" },
    { title: "Google Classroom", favicon: "https://ssl.gstatic.com/classroom/favicon.png" },
    { title: "Gmail", favicon: "https://mail.google.com/favicon.ico" },
    { title: "Google Docs", favicon: "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico" },
    { title: "Google Drive", favicon: "https://drive.google.com/favicon.ico" }
];

function showCloak() {
    if (cloak) return;
    cloak = document.createElement('iframe');
    cloak.src = WIKI_URL;
    Object.assign(cloak.style, {
        position: "fixed",
        top: 0,
        left: 0,
        width: "100vw",
        height: "100vh",
        border: "none",
        zIndex: 999999999,
        background: "#fff"
    });
    document.body.appendChild(cloak);
}

function hideCloak() {
    if (!cloak) return;
    cloak.remove();
    cloak = null;
}

function setWikipedia() {
    document.title = "Wikipedia";
    let link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.rel = 'icon';
    link.href = "https://en.wikipedia.org/static/favicon/wikipedia.ico";
    if (!document.querySelector("link[rel~='icon']")) document.head.appendChild(link);
}

function setRandomSafe() {
    if (panic) return;
    const random = safeIdentities[Math.floor(Math.random() * safeIdentities.length)];
    document.title = random.title;
    
    let link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.rel = 'icon';
    link.href = random.favicon;
    if (!document.querySelector("link[rel~='icon']")) document.head.appendChild(link);
}

// F2 Panic
window.addEventListener('keydown', e => {
    if (e.key === "F2") {
        e.preventDefault();
        panic = !panic;
        if (panic) {
            showCloak();
            setWikipedia();
        } else {
            hideCloak();
            setRandomSafe();
        }
    }
});

// Main visibility check
function checkVisibility() {
    if (panic) {
        showCloak();
        setWikipedia();
        return;
    }

    if (document.hidden) {
        showCloak();
        setWikipedia();
    } else {
        hideCloak();
    }
}

// Run visibility check
setInterval(checkVisibility, 100);

// Slow cycling ONLY when focused and not in panic (every 45-60 seconds)
setInterval(() => {
    if (!panic && !document.hidden) {
        setRandomSafe();
    }
}, 52000);

// Initial setup
window.addEventListener('load', () => {
    setRandomSafe();
});
  window.onbeforeunload = () => "Safety Check";
