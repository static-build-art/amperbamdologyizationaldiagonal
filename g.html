<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Page Blocked</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        /* --- BLOCK SCREEN CSS --- */
        html{font-size:14px}
        body{position:absolute;top:50%;left:50%;width:500px;height:254px;margin:-151px 0 0 -250px;background:#0072ca;text-align:center;color:#fff;font-family:sans-serif;overflow:hidden}
        h1{margin-bottom:50px}
        #block-title{font-size:x-large;color:inherit}
        #block-div{margin-bottom:20px}
        #custom-description,#description{font-size:medium;color:inherit;margin:10px 0}

        /* --- HUB STYLES --- */
        #actual-hub {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #121212; color: #e0e0e0; font-family: sans-serif;
            z-index: 99999; text-align: left;
        }
        #sidebar { width: 280px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #game-frame { flex-grow: 1; border: none; background: #000; }
        input { padding: 12px; background: #252525; color: white; border: none; border-bottom: 1px solid #333; outline: none; font-size: 13px; }
        #game-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        
        li {
            padding: 12px 15px; border-bottom: 1px solid #2a2a2a;
            cursor: pointer; font-size: 14px; transition: 0.1s;
            display: flex; justify-content: space-between; align-items: center;
        }
        li:hover { background: #333; }
        .fav-btn { color: #555; font-size: 18px; cursor: pointer; padding-left: 10px; }
        .fav-btn.active { color: #ffca28; }
        
        .controls { background: #1e1e1e; padding: 5px; display: flex; gap: 10px; border-bottom: 1px solid #333; }
        .controls button { background: #333; color: white; border: none; padding: 4px 10px; cursor: pointer; border-radius: 2px; font-size: 11px; }
        .controls button:hover { background: #444; }
    </style>
</head>
<body>

    <h1 id="block-title">This page has been blocked</h1>
    <div id="block-div"><p id="description">The website you are attempting to reach has been blocked.</p></div>
    <div><p id="custom-description"></p></div>

    <div id="actual-hub">
        <div id="sidebar">
            <input type="file" id="folder-input" webkitdirectory directory multiple>
            <input type="text" id="search" placeholder="Search library...">
            <ul id="game-list">
                <li style="color:#666; justify-content: center; font-size: 12px;">📂 Load "items" folder</li>
            </ul>
        </div>
        <div style="display: flex; flex-direction: column; flex-grow: 1;">
            <div class="controls">
                <button onclick="document.getElementById('game-frame').requestFullscreen()">Fullscreen</button>
                <button id="popout-btn">Pop Out (about:blank)</button>
                <span id="status" style="color: #666; font-size: 11px; align-self: center; margin-left: auto;">System Ready</span>
            </div>
            <iframe id="game-frame" src="about:blank"></iframe>
        </div>
    </div>

<script>
    const actualHub = document.getElementById('actual-hub');
    const folderInput = document.getElementById('folder-input');
    const gameList = document.getElementById('game-list');
    const searchInput = document.getElementById('search');
    const gameFrame = document.getElementById('game-frame');
    const popoutBtn = document.getElementById('popout-btn');

    let allFiles = [];
    let favorites = JSON.parse(localStorage.getItem('hub_favs')) || [];
    let currentBlobUrl = null;

    window.addEventListener('keydown', (e) => {
        if (e.key === 'F2') {
            e.preventDefault();
            actualHub.style.display = (actualHub.style.display === 'flex') ? 'none' : 'flex';
            document.title = (actualHub.style.display === 'flex') ? "Resources" : "Page Blocked";
        }
    });

    folderInput.addEventListener('change', (e) => {
        allFiles = Array.from(e.target.files).filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
        renderList(allFiles);
    });

    function renderList(files) {
        gameList.innerHTML = '';
        
        // Sort: Favorites first, then alphabetical
        const sortedFiles = [...files].sort((a, b) => {
            const aFav = favorites.includes(a.name);
            const bFav = favorites.includes(b.name);
            if (aFav && !bFav) return -1;
            if (!aFav && bFav) return 1;
            return a.name.localeCompare(b.name);
        });

        sortedFiles.forEach(file => {
            const li = document.createElement('li');
            const cleanName = file.name.replace('.html', '').replace(/[-_]/g, ' ');
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = cleanName;
            nameSpan.style.flexGrow = "1";
            nameSpan.onclick = () => {
                currentBlobUrl = URL.createObjectURL(file);
                gameFrame.src = currentBlobUrl;
                document.getElementById('status').textContent = "Active: " + cleanName;
            };

            const favStar = document.createElement('span');
            favStar.className = `fav-btn ${favorites.includes(file.name) ? 'active' : ''}`;
            favStar.innerHTML = '★';
            favStar.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(file.name);
            };

            li.appendChild(nameSpan);
            li.appendChild(favStar);
            gameList.appendChild(li);
        });
    }

    function toggleFavorite(fileName) {
        if (favorites.includes(fileName)) {
            favorites = favorites.filter(f => f !== fileName);
        } else {
            favorites.push(fileName);
        }
        localStorage.setItem('hub_favs', JSON.stringify(favorites));
        renderList(allFiles);
    }

    // --- POPOUT LOGIC ---
    popoutBtn.onclick = () => {
        if (!gameFrame.src || gameFrame.src === 'about:blank') return;
        
        // Fetch the content from the current blob
        fetch(gameFrame.src).then(res => res.text()).then(html => {
            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.write(html);
                win.document.close();
            }
        });
    };

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderList(allFiles.filter(f => f.name.toLowerCase().includes(term)));
    });

    window.onbeforeunload = () => "Safety Check";
</script>
</body>
</html>
